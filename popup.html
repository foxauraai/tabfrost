<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TabFrost</title>

<style>

  :root, [data-theme="dark"] {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --frost: #bae6fd;
    --danger: #f87171;
    --success: #34d399;
    --text: #e2e8f0;
    --muted: #64748b;
    --active: #22c55e;
    --suspended: #475569;
  }
  [data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf5;
    --border: #d1dce8;
    --accent: #0284c7;
    --accent2: #6d28d9;
    --frost: #0369a1;
    --danger: #dc2626;
    --success: #059669;
    --text: #0f172a;
    --muted: #64748b;
    --active: #059669;
    --suspended: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 400px;
    min-height: 560px;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f1d35 0%, #0a0e1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: relative;
    overflow: hidden;
  }
  [data-theme="light"] .header {
    background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 50%, rgba(56,189,248,0.06) 0%, transparent 70%);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .logo-name {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--frost), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--muted);
  }
  .toggle {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    appearance: none;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: var(--muted);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: all 0.2s;
  }
  .toggle.on { background: rgba(56,189,248,0.3); }
  .toggle.on::after { left: 17px; background: var(--accent); }

  .btn-settings {
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    font-size: 13px;
  }
  .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-cell {
    background: var(--surface);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-value {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-value.green { color: var(--success); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.purple { color: var(--accent2); }
  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Action Buttons */
  .actions {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .btn {
    flex: 1;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, monospace;
    font-size: 10px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    letter-spacing: 0.3px;
  }
  .btn-freeze {
    background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(129,140,248,0.1));
    color: var(--frost);
    border-color: rgba(56,189,248,0.3);
  }
  .btn-freeze:hover {
    background: linear-gradient(135deg, rgba(56,189,248,0.25), rgba(129,140,248,0.2));
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(56,189,248,0.15);
  }
  .btn-freeze:active { transform: translateY(0); }
  .btn-freeze .count-badge {
    background: var(--accent);
    color: var(--bg);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 700;
    min-width: 18px;
    text-align: center;
  }

  /* Filter Tabs */
  .filter-tabs {
    display: flex;
    padding: 10px 14px 0;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .filter-tab {
    padding: 6px 12px 8px;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Tab List */
  .tab-list {
    max-height: 300px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .tab-list::-webkit-scrollbar { width: 4px; }
  .tab-list::-webkit-scrollbar-track { background: transparent; }
  .tab-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tab-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    transition: background 0.15s;
    position: relative;
  }
  [data-theme="light"] .tab-item { border-bottom-color: rgba(209,220,232,0.7); }
  .tab-item:hover { background: var(--surface2); }
  .tab-item.is-active { background: rgba(34,197,94,0.04); }
  .tab-item.is-suspended { opacity: 0.55; }

  .tab-favicon {
    width: 16px; height: 16px;
    border-radius: 3px;
    flex-shrink: 0;
    object-fit: contain;
    background: var(--surface2);
  }
  .tab-favicon-placeholder {
    width: 16px; height: 16px;
    border-radius: 3px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .tab-info {
    flex: 1;
    min-width: 0;
  }
  .tab-title {
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    line-height: 1.3;
  }
  .tab-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .tab-idle {
    font-size: 9px;
    color: var(--muted);
  }
  .tab-badge {
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
  }
  .tab-badge.active { background: rgba(34,197,94,0.15); color: var(--active); }
  .tab-badge.suspended { background: rgba(71,85,105,0.3); color: var(--muted); }
  .tab-badge.pinned { background: rgba(251,191,36,0.15); color: #fbbf24; }

  /* Tab actions */
  .tab-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .tab-item:hover .tab-actions { opacity: 1; }
  .tab-action-btn {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 10px;
    transition: all 0.15s;
  }
  .tab-action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tab-action-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* Empty state */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }

  /* Loading */
  .loading {
    padding: 30px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 11px;
    color: var(--accent);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .tab-section { flex: 1; }

  .credit {
    font-size: 9px;
    color: var(--muted);
    line-height: 1;
    margin-top: 1px;
    letter-spacing: 0.2px;
  }
  .credit a {
    color: var(--frost);
    text-decoration: none;
    transition: color 0.15s;
  }
  .credit a:hover { color: var(--accent2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">❄️</div>
      <div>
        <div class="logo-name">TabFrost</div>
        <div class="credit"><a href="https://foxauraai.com/" target="_blank">by foxauraai.com</a></div>
      </div>
    </div>
    <div class="header-actions">
      <div class="toggle-wrap">
        <span id="toggle-label">ON</span>
        <button class="toggle on" id="toggle-enabled" title="Enable/Disable auto-suspend"></button>
      </div>
      <!-- Changed from <a target="_blank"> to a button using chrome.runtime.openOptionsPage() -->
      <button class="btn-settings" id="btn-settings" title="Settings">⚙</button>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-cell">
    <div class="stat-value blue" id="stat-active">—</div>
    <div class="stat-label">Active</div>
  </div>
  <div class="stat-cell">
    <div class="stat-value purple" id="stat-suspended">—</div>
    <div class="stat-label">Frozen</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-freeze" id="btn-freeze-all">
    ❄️ Freeze All
    <span class="count-badge" id="freeze-count">0</span>
  </button>
</div>

<div class="filter-tabs">
  <div class="filter-tab active" data-filter="all">All</div>
  <div class="filter-tab" data-filter="active">Active</div>
  <div class="filter-tab" data-filter="suspended">Frozen</div>
</div>

<div class="tab-section">
  <div class="tab-list" id="tab-list">
    <div class="loading">Loading tabs…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
