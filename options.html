<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<title>TabFrost Settings</title>

<style>

  /* ── Theme tokens ── */
  :root, [data-theme="dark"] {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --frost: #bae6fd;
    --danger: #f87171;
    --success: #34d399;
    --text: #e2e8f0;
    --muted: #64748b;
    --shadow: rgba(0,0,0,0.4);
    --btn-save-bg: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(129,140,248,0.15));
    --btn-save-border: rgba(56,189,248,0.4);
    --btn-save-color: #bae6fd;
    --range-bg: #1e2d45;
  }

  [data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf5;
    --border: #d1dce8;
    --accent: #0284c7;
    --accent2: #6d28d9;
    --frost: #0369a1;
    --danger: #dc2626;
    --success: #059669;
    --text: #0f172a;
    --muted: #64748b;
    --shadow: rgba(0,0,0,0.1);
    --btn-save-bg: linear-gradient(135deg, rgba(2,132,199,0.12), rgba(109,40,217,0.08));
    --btn-save-border: rgba(2,132,199,0.4);
    --btn-save-color: #0369a1;
    --range-bg: #d1dce8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 40px 0 60px;
    transition: background 0.25s, color 0.25s;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
  }
  .page-title {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .page-subtitle { color: var(--muted); font-size: 11px; margin-top: 1px; }

  /* Theme toggle pill */
  .theme-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    user-select: none;
  }
  .theme-pill input { display: none; }
  .theme-pill-track {
    width: 34px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .theme-pill-track::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: var(--muted);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: all 0.2s;
  }
  #theme-toggle:checked ~ .theme-pill-track { background: rgba(56,189,248,0.3); }
  #theme-toggle:checked ~ .theme-pill-track::after { left: 19px; background: var(--accent); }
  #theme-label { font-size: 11px; color: var(--muted); min-width: 52px; }

  /* Sections */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px var(--shadow);
    transition: background 0.25s, border-color 0.25s;
  }
  .section-title {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.3px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .field-desc {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    opacity: 0.75;
    line-height: 1.5;
  }

  /* Slider */
  input[type="range"] {
    width: 100%;
    appearance: none;
    background: var(--range-bg);
    border-radius: 4px;
    height: 6px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 6px rgba(56,189,248,0.22);
  }
  .range-display {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 10px;
  }
  .range-value {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }
  .range-unit { font-size: 11px; color: var(--muted); }

  /* Whitelist */
  .whitelist-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-domain {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s, background 0.25s;
  }
  .input-domain:focus { border-color: var(--accent); }
  .input-domain::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--btn-save-bg);
    border: 1px solid var(--btn-save-border);
    color: var(--btn-save-color);
    border-radius: 8px;
    padding: 9px 16px;
    font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 500;
  }
  .btn-add:hover { filter: brightness(1.15); }

  .whitelist-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 24px;
  }
  .whitelist-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px 5px 10px;
    font-size: 11px;
    color: var(--text);
    transition: background 0.2s;
  }
  .whitelist-item .remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }
  .whitelist-item .remove:hover { color: var(--danger); }
  .whitelist-empty { color: var(--muted); font-size: 11px; font-style: italic; }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: background 0.25s;
  }
  .stat-card-value {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--success);
    margin-bottom: 4px;
    line-height: 1;
  }
  .stat-card-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  /* Footer buttons */
  .footer-btns {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-save {
    flex: 1;
    padding: 13px;
    background: var(--btn-save-bg);
    border: 1px solid var(--btn-save-border);
    color: var(--btn-save-color);
    border-radius: 10px;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-save:hover { filter: brightness(1.1); box-shadow: 0 4px 16px var(--shadow); }
  .btn-save:active { transform: translateY(1px); }

  .btn-reset {
    padding: 13px 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); }
  .btn-reset:active { transform: translateY(1px); }

  .saved-msg {
    text-align: center;
    color: var(--success);
    font-size: 12px;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    height: 20px;
  }
  .saved-msg.show { opacity: 1; }

  .credit {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.2px;
  }
  .credit a {
    color: var(--frost);
    text-decoration: none;
    transition: color 0.15s;
  }
  .credit a:hover { color: var(--accent2); }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="header-left">
      <div class="logo-icon">❄️</div>
      <div>
        <div class="page-title">TabFrost</div>
        <div class="page-subtitle">Memory Saver Settings</div>
        <div class="credit"><a href="https://foxauraai.com/" target="_blank">by foxauraai.com</a></div>
      </div>
    </div>
    <!-- unchecked = light (default), checked = dark -->
    <label class="theme-pill">
      <input type="checkbox" id="theme-toggle">
      <div class="theme-pill-track"></div>
      <span id="theme-label">☀️ Light</span>
    </label>
  </div>

  <!-- Auto Suspend -->
  <div class="section">
    <div class="section-title">⏱ Auto-Suspend</div>
    <div class="field">
      <label class="field-label" for="range-minutes">Suspend tabs after being inactive for:</label>
      <input type="range" id="range-minutes" min="5" max="120" step="5" value="30">
      <div class="range-display">
        <div>
          <span class="range-value" id="range-display">30</span>
          <span class="range-unit"> minutes</span>
        </div>
        <span class="range-unit" id="range-hours-display"></span>
      </div>
      <p class="field-desc">Tabs idle longer than this will be automatically frozen to free RAM.</p>
    </div>
  </div>

  <!-- Whitelist -->
  <div class="section">
    <div class="section-title">✅ Whitelist (Never Suspend)</div>
    <div class="field">
      <label class="field-label">Add a domain to protect:</label>
      <div class="whitelist-input-row">
        <input type="text" class="input-domain" id="whitelist-input" placeholder="e.g. gmail.com, notion.so">
        <button class="btn-add" id="btn-add-whitelist">+ Add</button>
      </div>
      <div class="whitelist-items" id="whitelist-items">
        <span class="whitelist-empty">No domains whitelisted yet.</span>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-title">📊 Lifetime Stats</div>
    <div class="stats-grid">
      <div class="stat-card" style="text-align: center;">
        <div class="stat-card-value" style="color:var(--accent2)" id="stats-count">0</div>
        <div class="stat-card-label">Tabs Frozen</div>
      </div>
    </div>
  </div>

  <div class="footer-btns">
    <button class="btn-save" id="btn-save">❄ Save Settings</button>
    <button class="btn-reset" id="btn-reset-stats">Reset Defaults</button>
  </div>
  <div class="saved-msg" id="saved-msg">✓ Settings saved!</div>

</div>
<script src="options.js"></script>
</body>
</html>
